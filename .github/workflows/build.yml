name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # 匹配 v0.1.0, v1.0.0 等格式的 tag
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '版本号（可选，留空则使用 pyproject.toml 中的版本）'
        required: false
        default: ''

# 设置 PyPI Trusted Publishers 所需的权限
permissions:
  id-token: write  # OIDC token 用于 Trusted Publishers 认证
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: List built files
        run: ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitcode-insight-wheel
          path: dist/*.whl
          retention-days: 30

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: gitcode-insight-sdist
          path: dist/*.tar.gz
          retention-days: 30

  publish:
    runs-on: ubuntu-latest
    needs: build
    # 只在 tag 推送时发布到 PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi

    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: gitcode-insight-wheel
          path: dist/

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: gitcode-insight-sdist
          path: dist/

      - name: List files to publish
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1