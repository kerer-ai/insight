name: Build Wheel Package

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '版本号（可选，留空则使用 pyproject.toml 中的版本）'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel package
        run: python -m build

      - name: List built files
        run: ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitcode-insight-wheel
          path: dist/*.whl
          retention-days: 30

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: gitcode-insight-sdist
          path: dist/*.tar.gz
          retention-days: 30